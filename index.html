<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>F.R.I.E.N.D. Proposal | Executive View</title>
<style>
:root{--ks-blue:#003f8f;--ks-blue-dark:#002b70;--ks-blue-active:#075abf;--ks-red:#d71920;--banner-height:74px;--line-height:2px}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(90deg,#001f55 0%,#003f8f 50%,#001f55 100%);overflow:hidden}.nav-banner{height:var(--banner-height);width:100%;background:linear-gradient(180deg,var(--ks-blue),var(--ks-blue-dark));display:flex;align-items:center;justify-content:center;padding:8px 10px;box-shadow:0 3px 12px rgba(0,0,0,.22);position:relative;z-index:10}.button-strip{width:100%;height:100%;display:flex;align-items:center;justify-content:center;gap:6px;overflow:hidden}.button-strip button{appearance:none;border:1px solid rgba(255,255,255,.28);background:rgba(255,255,255,.08);color:#fff;height:42px;padding:0 9px;border-radius:4px;font-size:clamp(8px,.68vw,12px);line-height:1.05;font-weight:800;letter-spacing:.01em;cursor:pointer;text-align:center;display:flex;align-items:center;justify-content:center;flex:1 1 0;min-width:0;max-width:154px;transition:background .18s ease,transform .18s ease,border-color .18s ease}.button-strip button:hover{background:rgba(255,255,255,.18);transform:translateY(-1px)}.button-strip button.active{background:var(--ks-blue-active);border-color:#fff;box-shadow:inset 0 -3px 0 #fff}.red-tramline{height:var(--line-height);background:var(--ks-red);width:100%;position:relative;z-index:9}.page-stage{width:100vw;height:calc(100vh - var(--banner-height) - var(--line-height));display:flex;align-items:center;justify-content:center;background:linear-gradient(90deg,#001f55 0%,#003f8f 50%,#001f55 100%);overflow:hidden}.page-panel{width:100%;height:100%;display:flex;align-items:center;justify-content:center;opacity:0;animation:fadeIn .18s ease forwards}.slide-image{display:block;max-width:100vw;max-height:calc(100vh - var(--banner-height) - var(--line-height));width:auto;height:auto;object-fit:contain}.error{font:700 18px Arial;color:#b00020;background:#fff;padding:24px;border-radius:8px}.references-page{width:100%;height:100%;overflow:auto;background:#fff;padding:22px 30px 34px;color:#001a52}.ref-header{display:flex;align-items:center;gap:18px;margin-bottom:16px;border-bottom:2px solid var(--ks-red);padding-bottom:10px}.ref-icon{width:54px;height:54px;border-radius:50%;border:4px solid var(--ks-blue-dark);display:grid;place-items:center;font-size:28px;color:var(--ks-blue-dark);font-weight:900}.ref-header h1{margin:0;font-size:32px;letter-spacing:.04em;color:var(--ks-blue-dark)}.ref-header p{margin:4px 0 0;color:var(--ks-blue);font-size:15px;font-weight:800}.ref-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.ref-card{border:1px solid #cad7ea;border-radius:8px;overflow:hidden;background:#fff}.ref-card h2{margin:0;background:linear-gradient(180deg,var(--ks-blue),var(--ks-blue-dark));color:#fff;text-align:center;padding:9px;font-size:15px;letter-spacing:.03em}.ref-wide{grid-column:1/-1}.ref-table{width:100%;border-collapse:collapse;font-size:12px}.ref-table th,.ref-table td{border-bottom:1px solid #e3eaf5;border-right:1px solid #e3eaf5;padding:7px;vertical-align:top}.ref-table th{background:#f4f7fc;color:var(--ks-blue-dark);text-align:left}.ref-table a{color:#064fc0;font-weight:800;text-decoration:underline}.source-note{margin-top:14px;background:linear-gradient(180deg,var(--ks-blue),var(--ks-blue-dark));color:#fff;border-radius:8px;padding:14px 16px;font-size:14px;line-height:1.35}@keyframes fadeIn{to{opacity:1}}@media(max-width:1180px){:root{--banner-height:90px}.button-strip{flex-wrap:wrap;align-content:center}.button-strip button{height:32px;flex:1 1 13%;font-size:10px;padding:0 5px}.ref-grid{grid-template-columns:1fr}}@media(max-width:640px){:root{--banner-height:116px}.nav-banner{padding:6px}.button-strip{gap:4px}.button-strip button{height:28px;flex:1 1 24%;font-size:8px;padding:0 3px}.references-page{padding:12px}.ref-icon{display:none}.ref-header h1{font-size:22px}.ref-table{font-size:10px}.ref-table th,.ref-table td{padding:5px}}
</style>
</head>
<body>
<header class="nav-banner"><nav class="button-strip" id="tabbar" aria-label="Proposal sections"></nav></header>
<div class="red-tramline" aria-hidden="true"></div>
<main class="page-stage" id="stage" aria-live="polite"><div class="error">Loading F.R.I.E.N.D. proposal...</div></main>
<script>
const pages=[
{id:'executive-view',title:'Executive View',image:'images/executive-view.png'},
{id:'financial-opportunity-analysis',title:'Financial Opportunity Analysis',image:'images/financial-opportunity-analysis.png'},
{id:'10-point-rollout',title:'10-Point Rollout',image:'images/10-point-rollout.png'},
{id:'pre-pilot',title:'Pre-Pilot',image:'images/pre-pilot.png'},
{id:'pre-pilot-cost',title:'Pre-Pilot Cost',image:'images/pre-pilot-cost.png'},
{id:'pilot-program',title:'Pilot Program',image:'images/pilot-program.png'},
{id:'regional-rollout',title:'Regional Rollout',image:'images/regional-rollout.png'},
{id:'divisional-rollout',title:'Divisional Rollout',image:'images/divisional-rollout.png'},
{id:'divisional-investment-strategy',title:'Divisional Investment Strategy',image:'images/divisional-investment-strategy.png'},
{id:'roi',title:'ROI',image:'images/roi.png'},
{id:'cost-of-inaction',title:'Cost of Inaction',image:'images/cost-of-inaction.png'},
{id:'red-team',title:'Red Team',image:'images/red-team.png'},
{id:'research-references',title:'Research and References',html:renderReferences},
{id:'thank-you',title:'Thank You',image:'images/thank-you.png'}
];
const refs={
'Retail & Industry Reports':[
['Kroger','Annual Reports','Financial performance & strategic overview','https://ir.kroger.com/financials/annual-reports/default.aspx'],['Kroger','ESG Report','Environmental, social & governance','https://www.thekrogerco.com/sustainability/'],['Kroger Investor Relations','Investor Relations Overview','Investor information & financial updates','https://ir.kroger.com/'],['National Retail Federation','Retail resources','Retail industry trends & outlook','https://nrf.com/resources'],['Deloitte','Retail Industry Outlook','Retail trends, risks & opportunities','https://www.deloitte.com/us/en/industries/retail.html'],['McKinsey & Company','Retail Insights','AI adoption and retail operations','https://www.mckinsey.com/industries/retail/our-insights'],['PwC','Consumer Markets Insights','Consumer behavior & retail strategy','https://www.pwc.com/us/en/industries/consumer-markets.html'],['Gartner','Technology Trends','Emerging technology impact on retail','https://www.gartner.com/en/information-technology']],
'Academic & Industry Research':[
['Harvard Business Review','Team performance research','Team performance & leadership','https://hbr.org/'],['MIT Sloan Management Review','Digital Transformation Research','Digital transformation in retail','https://sloanreview.mit.edu/'],['Stanford HAI','AI Index Report','AI trends and research insights','https://aiindex.stanford.edu/report/'],['Cornell SC Johnson College','Retail Operations Research','Operational excellence in retail','https://www.johnson.cornell.edu/research/'],['Forrester','Retail Execution Research','Retail execution platforms','https://www.forrester.com/reports/'],['Accenture','Retail Operations with AI','AI-driven operations','https://www.accenture.com/us-en/industries/retail'],['Josh Bersin Company','Talent Trends','Workforce strategy & development','https://joshbersin.com/research/']],
'Government & Regulatory Standards':[
['OSHA','Workplace Safety Guidelines','Workplace safety & compliance','https://www.osha.gov/'],['U.S. Department of Labor','Workforce Development Programs','Workforce & training resources','https://www.dol.gov/'],['U.S. Bureau of Labor Statistics','Employment & Wage Statistics','Labor market & economic data','https://www.bls.gov/'],['FDA Food Code','Food Code','Food safety standards','https://www.fda.gov/food/fda-food-code'],['USDA FSIS','Food Safety Resources','Meat & poultry safety','https://www.fsis.usda.gov/'],['CDC','Food Safety & Hygiene','Public health & food safety','https://www.cdc.gov/foodsafety/'],['NIST','AI Risk Management Framework','AI governance & risk management','https://www.nist.gov/itl/ai-risk-management-framework']],
'Technology & AI Resources':[
['Microsoft','Responsible AI','AI principles & governance','https://www.microsoft.com/en-us/ai/responsible-ai'],['Google','AI Principles','AI ethics & best practices','https://ai.google/responsibility/principles/'],['IBM','AI Governance Toolkit','Enterprise AI governance','https://www.ibm.com/think/topics/ai-governance'],['OpenAI','Research','AI research & safety','https://openai.com/research/'],['Amazon Web Services','AWS Retail Solutions','Cloud solutions for retail','https://aws.amazon.com/retail/'],['Zebra Technologies','Retail Solutions','Frontline technology solutions','https://www.zebra.com/us/en/solutions/retail.html'],['NVIDIA','AI for Retail','AI infrastructure & solutions','https://www.nvidia.com/en-us/industries/retail/'],['Salesforce','Customer 360 for Retail','Customer experience platform','https://www.salesforce.com/industries/retail/']],
'Retail Operations & Best Practices':[
['Institute for Supply Management','Supply Chain Management Principles','Supply chain excellence','https://www.ismworld.org/'],['APQC','Process & Performance Benchmarking','Operational benchmarking','https://www.apqc.org/'],['Lean Enterprise Institute','Lean Management Resources','Process improvement','https://www.lean.org/'],['Prosci','Change Management Best Practices','Organizational change management','https://www.prosci.com/'],['Gallup','State of the Global Workplace','Employee engagement insights','https://www.gallup.com/workplace.aspx'],['Kantar','Retail Shopper Behavior','Shopper insights & trends','https://www.kantar.com/campaigns/consumer-shopper']]
};
const tabbar=document.getElementById('tabbar');const stage=document.getElementById('stage');
function currentId(){const id=decodeURIComponent(location.hash.replace('#',''));return pages.some(p=>p.id===id)?id:pages[0].id}
function go(id){if(currentId()!==id)location.hash=id;else load(id)}
function load(id){const page=pages.find(p=>p.id===id)||pages[0];document.title=`F.R.I.E.N.D. Proposal | ${page.title}`;document.querySelectorAll('#tabbar button').forEach(btn=>btn.classList.toggle('active',btn.dataset.page===page.id));const active=document.querySelector(`#tabbar button[data-page="${page.id}"]`);if(active)active.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});if(page.html){stage.innerHTML=`<article class="page-panel">${page.html()}</article>`}else{stage.innerHTML=`<article class="page-panel"><img class="slide-image" src="${page.image}" alt="${page.title}" onerror="this.parentElement.innerHTML='<div class=&quot;error&quot;>Image not found: ${page.image}</div>'"></article>`}}
function handleKeys(e){if(['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName))return;const i=pages.findIndex(p=>p.id===currentId());if(e.key==='ArrowRight')go(pages[Math.min(i+1,pages.length-1)].id);if(e.key==='ArrowLeft')go(pages[Math.max(i-1,0)].id)}
function renderReferences(){const cards=Object.entries(refs).map(([title,rows])=>{const wide=title.includes('Retail Operations')?' ref-wide':'';const body=rows.map(r=>`<tr><td><strong>${r[0]}</strong></td><td>${r[1]}</td><td>${r[2]}</td><td><a href="${r[3]}" target="_blank" rel="noopener noreferrer">Open Source ↗</a></td></tr>`).join('');return`<section class="ref-card${wide}"><h2>${title}</h2><table class="ref-table"><thead><tr><th>Source / Organization</th><th>Publication / Resource</th><th>Topic / Focus</th><th>Link</th></tr></thead><tbody>${body}</tbody></table></section>`}).join('');return`<div class="references-page"><div class="ref-header"><div class="ref-icon">⌕</div><div><h1>RESEARCH & REFERENCES</h1><p>Evidence Base Supporting Project F.R.I.E.N.D.</p></div></div><div class="ref-grid">${cards}</div><div class="source-note"><strong>Project F.R.I.E.N.D. is based on publicly available industry research, operational best practices, food safety standards, workforce development guidance, and enterprise AI frameworks.</strong><br>All external sources are linked for independent review.</div></div>`}
function init(){tabbar.innerHTML=pages.map(p=>`<button type="button" data-page="${p.id}">${p.title}</button>`).join('');tabbar.addEventListener('click',e=>{const btn=e.target.closest('button[data-page]');if(btn)go(btn.dataset.page)});window.addEventListener('hashchange',()=>load(currentId()));document.addEventListener('keydown',handleKeys);load(currentId())}
init();
</script>
</body>
</html>
